name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy-web:
    name: Deploy frontend to Vercel
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != ''
        run: npm ci

      - name: Install Vercel CLI
        if: env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != ''
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        if: env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != ''
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN" --cwd apps/web

      - name: Build Vercel app
        if: env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != ''
        run: vercel build --prod --token="$VERCEL_TOKEN" --cwd apps/web

      - name: Deploy Vercel app
        if: env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != ''
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN" --cwd apps/web

      - name: Skip Vercel deploy
        if: env.VERCEL_TOKEN == '' || env.VERCEL_ORG_ID == '' || env.VERCEL_PROJECT_ID == ''
        run: echo "Vercel deployment skipped because required secrets are not configured."

  deploy-render:
    name: Trigger Render deploys
    runs-on: ubuntu-latest
    needs:
      - deploy-web
    if: always()
    env:
      RENDER_API_DEPLOY_HOOK: ${{ secrets.RENDER_API_DEPLOY_HOOK }}
      RENDER_WORKER_DEPLOY_HOOK: ${{ secrets.RENDER_WORKER_DEPLOY_HOOK }}
    steps:
      - name: Trigger Render API deploy
        if: env.RENDER_API_DEPLOY_HOOK != ''
        run: curl --fail --request POST "$RENDER_API_DEPLOY_HOOK"

      - name: Trigger Render worker deploy
        if: env.RENDER_WORKER_DEPLOY_HOOK != ''
        run: curl --fail --request POST "$RENDER_WORKER_DEPLOY_HOOK"

      - name: Skip Render deploy
        if: env.RENDER_API_DEPLOY_HOOK == '' && env.RENDER_WORKER_DEPLOY_HOOK == ''
        run: echo "Render deployment skipped because deploy hook secrets are not configured."
